<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bombay Pan Parlour & Provision Store - Udhar Book</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0}.wrap{max-width:700px;margin:auto;padding:16px}
.card{background:#fff;padding:12px;border-radius:8px;margin:10px 0;box-shadow:0 2px 6px #ccc}
input,button{width:100%;padding:10px;margin:6px 0}button{background:#0a7;color:#fff;border:0}
.item{border-bottom:1px solid #ddd;padding:8px 0}
.small{color:#666;font-size:12px}
</style></head><body><div class="wrap">
<h2>Bombay Pan Parlour & Provision Store</h2><h3>Udhar Book</h3>
<input id=n placeholder="Customer Name"><input id=m placeholder="Mobile Number"><input id=a type=number placeholder="Amount"><input id=d placeholder="Details">
<button onclick="add()">Save</button>
<input id=s oninput="render()" placeholder="Search">
<h3>Total ₹<span id=t>0</span></h3><div id=list></div></div>
<script>
let data=JSON.parse(localStorage.udhar||'[]');
function save(){localStorage.udhar=JSON.stringify(data)}
function add(){if(!n.value||!a.value)return alert('Enter name & amount');data.push({id:Date.now(),n:n.value,m:m.value,a:+a.value,d:d.value,dt:new Date().toLocaleString()});n.value=m.value=a.value=d.value='';save();render();}
function paid(id){data=data.filter(x=>x.id!=id);save();render();}
function render(){let q=s.value.toLowerCase(),h='',tot=0;data.filter(x=>x.n.toLowerCase().includes(q)).forEach(x=>{tot+=x.a;h+=`<div class=item><b>${x.n}</b><br>₹${x.a}<br>${x.d}<div class=small>${x.m}<br>${x.dt}</div><button onclick="paid(${x.id})">Paid/Delete</button></div>`});list.innerHTML=h||'No Records';t.textContent=tot;}
render();
</script></body></html>
